<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>WOODLED Shortener — Tester v3 (GET-only)</title>
<style>
  body { font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 820px; margin: 32px auto; padding: 0 20px; color: #222; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  h2 { font-size: 13px; margin: 24px 0 8px; color: #555; text-transform: uppercase; letter-spacing: .06em; }
  .sub { color: #777; font-size: 12px; margin: 0 0 20px; }
  input[type=text] { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font: 12px/1.4 ui-monospace, Menlo, Consolas, monospace; box-sizing: border-box; }
  button { padding: 7px 13px; border: 1px solid #2b6cb0; background: #3182ce; color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; margin: 4px 4px 4px 0; }
  button:hover { background: #2b6cb0; }
  pre { background: #f5f5f7; padding: 10px; border-radius: 6px; white-space: pre-wrap; word-break: break-all; font: 11px/1.5 ui-monospace, Menlo, Consolas, monospace; margin: 6px 0; max-height: 200px; overflow: auto; }
  .ok { color: #1a7c3b; font-weight: 600; }
  .bad { color: #c62828; font-weight: 600; }
  .pending { color: #b8860b; }
  .row { margin: 10px 0 20px; padding: 12px; border: 1px solid #eee; border-radius: 8px; }
  .row h3 { margin: 0 0 4px; font-size: 13px; }
  .row .desc { color: #888; font-size: 11px; margin: 0 0 8px; }
  label { display: block; margin: 4px 0; font-size: 12px; color: #555; }
</style>
</head>
<body>

<h1>WOODLED Shortener — Tester v3</h1>
<p class="sub">GET-only архитектура: save и load оба через GET. CORS у Apps Script на GET стабилен.</p>

<label for="url">Web App URL</label>
<input id="url" type="text" value="https://script.google.com/macros/s/AKfycbwAQGNtporbFyV-UC1xLrI_t-u1SwYezcMOmycrvuXVrC0yxsdRthbWQK-jd9NX1ydK/exec">

<h2>1 · Ping</h2>
<div class="row">
  <button id="bPing">GET (без параметров)</button>
  <div id="rPing"></div>
</div>

<h2>2 · Save (GET ?save=...)</h2>
<div class="row">
  <p class="desc">Отправляет тестовый payload как query-параметр. Должен вернуться ID.</p>
  <button id="bSave">GET save</button>
  <div id="rSave"></div>
</div>

<h2>3 · Load (GET ?id=...)</h2>
<div class="row">
  <label for="id">ID (заполнится автоматически после save)</label>
  <input id="id" type="text" placeholder="например, xK4mQ7">
  <button id="bLoad" style="margin-top:8px;">GET load</button>
  <div id="rLoad"></div>
</div>

<script>
const TEST_PAYLOAD = 'eyJ0ZXN0IjoidGVzdCIsImhlbGxvIjp7Im5lc3RlZCI6dHJ1ZX19';

function render(el, status, info) {
  const cls = status === 'ok' ? 'ok' : status === 'bad' ? 'bad' : 'pending';
  const label = status === 'ok' ? '✓ OK' : status === 'bad' ? '✗ Fail' : '… запрос…';
  el.innerHTML = `<div class="${cls}">${label}</div><pre>${info}</pre>`;
}

document.getElementById('bPing').onclick = async () => {
  const url = document.getElementById('url').value.trim();
  const out = document.getElementById('rPing');
  render(out, 'pending', 'GET ' + url);
  try {
    const r = await fetch(url);
    const text = await r.text();
    let parsed; try { parsed = JSON.parse(text); } catch { parsed = null; }
    const ok = parsed && parsed.ok === true;
    render(out, ok ? 'ok' : 'bad', `Status: ${r.status}\nResponse: ${text}`);
  } catch (e) { render(out, 'bad', 'Error: ' + e.message); }
};

document.getElementById('bSave').onclick = async () => {
  const baseUrl = document.getElementById('url').value.trim();
  const out = document.getElementById('rSave');
  const fullUrl = baseUrl + '?save=' + encodeURIComponent(TEST_PAYLOAD) + '&type=s';
  render(out, 'pending', 'GET ' + fullUrl);
  try {
    const r = await fetch(fullUrl);
    const text = await r.text();
    let parsed; try { parsed = JSON.parse(text); } catch { parsed = null; }
    const ok = parsed && parsed.id && !parsed.error;
    if (ok) document.getElementById('id').value = parsed.id;
    render(out, ok ? 'ok' : 'bad',
      `Status: ${r.status}\nResponse: ${text}` +
      (ok ? `\n\nID: ${parsed.id} — теперь нажмите "GET load".` : ''));
  } catch (e) { render(out, 'bad', 'Error: ' + e.message); }
};

document.getElementById('bLoad').onclick = async () => {
  const baseUrl = document.getElementById('url').value.trim();
  const id = document.getElementById('id').value.trim();
  const out = document.getElementById('rLoad');
  if (!id) { render(out, 'bad', 'Сначала запустите save или введите ID вручную.'); return; }
  const fullUrl = baseUrl + '?id=' + encodeURIComponent(id);
  render(out, 'pending', 'GET ' + fullUrl);
  try {
    const r = await fetch(fullUrl);
    const text = await r.text();
    let parsed; try { parsed = JSON.parse(text); } catch { parsed = null; }
    const ok = parsed && parsed.payload && !parsed.error;
    const match = parsed && parsed.payload === TEST_PAYLOAD;
    render(out, ok && match ? 'ok' : 'bad',
      `Status: ${r.status}\nResponse: ${text}` +
      (ok && match ? '\n\nPayload совпадает с отправленным — round-trip полный.' : ''));
  } catch (e) { render(out, 'bad', 'Error: ' + e.message); }
};
</script>
</body>
</html>
